<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Plans</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">
        <div class="brand__mark" aria-hidden="true">
          <span class="dot"></span>
        </div>
        <div class="brand__text">
          <div class="brand__name">My Plans</div>
          <div class="brand__subtitle">Organiza tus planes con claridad</div>
        </div>
      </div>

      <div class="topbar__actions">
        <div class="counter" title="Planes visibles">
          <span class="counter__label">Visibles</span>
          <span class="counter__value" id="visibleCount">0</span>
        </div>

        <button class="btn btn--primary" id="btnNew" type="button">
          <span class="btn__icon" aria-hidden="true">＋</span>
          Nuevo Plan
        </button>

        <button class="btn btn--soft" id="btnExport" type="button">Exportar</button>
        <button class="btn btn--soft" id="btnSave" type="button">Guardar cambios</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="field">
        <label class="label" for="searchInput">Buscar</label>
        <div class="inputWrap">
          <span class="inputIcon" aria-hidden="true">⌕</span>
          <input id="searchInput" class="input input--search" type="search" placeholder="Título o descripción" autocomplete="off" />
        </div>
      </div>

      <div class="field">
        <label class="label" for="statusSelect">Estado</label>
        <select id="statusSelect" class="select">
          <option value="all">Todos</option>
          <option value="planned">Planned</option>
          <option value="completed">Completed</option>
          <option value="canceled">Canceled</option>
        </select>
      </div>

      <div class="field">
        <label class="label" for="orderSelect">Orden</label>
        <select id="orderSelect" class="select">
          <option value="desc">Fecha descendente</option>
          <option value="asc">Fecha ascendente</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="feedback" id="feedback" role="status" aria-live="polite"></div>

    <section class="grid" id="plansGrid" aria-label="Lista de planes"></section>

    <section class="empty" id="emptyState" hidden>
      <div class="empty__card">
        <div class="empty__title">Sin resultados</div>
        <div class="empty__text">Empieza creando tu primer plan o ajusta los filtros.</div>
        <button class="btn btn--primary btn--wide" id="btnEmptyNew" type="button">Crear mi primer plan</button>
      </div>
    </section>
  </main>

  <button class="fab" id="fab" type="button" aria-label="Nuevo Plan">+</button>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__overlay" data-close="true"></div>

    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__header">
        <div class="modal__titles">
          <div class="modal__eyebrow" id="modalEyebrow">My Plans</div>
          <h2 class="modal__title" id="modalTitle">Nuevo Plan</h2>
        </div>
        <button class="iconBtn" id="btnModalClose" type="button" aria-label="Cerrar">✕</button>
      </div>

      <form class="modal__body" id="planForm" novalidate>
        <div class="formGrid">
          <div class="field field--span2">
            <label class="label" for="titleInput">Título <span class="req">*</span></label>
            <input id="titleInput" class="input" type="text" placeholder="Ej. Cena especial" minlength="3" required />
            <div class="hint" id="titleHint">Mínimo 3 caracteres.</div>
          </div>

          <div class="field">
            <label class="label" for="dateInput">Fecha</label>
            <input id="dateInput" class="input" type="date" />
          </div>

          <div class="field">
            <label class="label" for="timeInput">Hora</label>
            <input id="timeInput" class="input" type="time" />
          </div>

          <div class="field field--span2">
            <label class="label" for="statusInput">Estado</label>
            <select id="statusInput" class="select">
              <option value="planned">planned</option>
              <option value="completed">completed</option>
              <option value="canceled">canceled</option>
            </select>
          </div>

          <div class="field field--span2">
            <label class="label" for="descInput">Descripción</label>
            <textarea id="descInput" class="textarea" rows="4" placeholder="Detalles del plan (opcional)"></textarea>
          </div>
        </div>

        <div class="modal__footer">
          <button class="btn btn--soft" id="btnCancel" type="button">Cancelar</button>
          <button class="btn btn--primary" id="btnSubmit" type="submit">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <template id="cardTemplate">
    <article class="card">
      <div class="card__top">
        <div class="card__titleRow">
          <h3 class="card__title"></h3>
          <span class="badge" data-badge></span>
        </div>
        <div class="card__meta">
          <span class="meta" data-datetime></span>
          <span class="meta meta--dot" aria-hidden="true">•</span>
          <span class="meta" data-updated></span>
        </div>
      </div>

      <p class="card__desc" data-desc></p>

      <div class="card__actions">
        <button class="btn btn--soft btn--sm" data-action="edit" type="button">Editar</button>
        <button class="btn btn--soft btn--sm" data-action="complete" type="button">Completar</button>
        <button class="btn btn--danger btn--sm" data-action="delete" type="button">Eliminar</button>
      </div>
    </article>
  </template>

</body>
</html>
